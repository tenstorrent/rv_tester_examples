image:
    name: "ghcr.io/tenstorrent/cvm:0.1.3"

include:
  - project: 'riscv/dv/gitlab-definitions'
    ref: main
    file: 'common-definitions.yml'

stages:
    - test

# Each example is a self-contained Bazel workspace in its own top-level dir; the
# jobs cd into the example before invoking bazel. Output root stays under the
# example dir (gitignored).
.test-template:
    variables:
        SCHEDULER_PARAMETERS: "-n 8 -R span[hosts=1]"
        BAZEL_OPTS: "--jobs=8"

build:
    stage: test
    extends:
        - .test-template
    script:
        - cd cva6 && bazel-7 --output_user_root=./bazel_output_user_root build //dv/cva6/verilator:cva6_tb_verilator --config=bzlmod ${BAZEL_OPTS}
    after_script:
        - chmod +w -R ./cva6/bazel_output_user_root
    timeout: 3h

smoke:
    stage: test
    extends:
        - .test-template
    script:
        - cd cva6 && bazel-7 --output_user_root=./bazel_output_user_root test //dv/cva6/testlists:all_smoke --config=bzlmod --build_tests_only --test_output=errors ${BAZEL_OPTS}
    after_script:
        - chmod +w -R ./cva6/bazel_output_user_root
    timeout: 3h
